# ====================================================================
# ARL 现代化重写版 配置文件示例
# 复制为 config.yaml 后修改。架构已去除 Celery/RabbitMQ，改为 asyncio + APScheduler。
# ====================================================================

MONGO:
  URI: 'mongodb://127.0.0.1:27017/'
  DB: 'arl'

# 利用三方 API 进行域名收集（13 个数据源插件）
# 测试命令: python -m tests.test_query_plugin [source1] [source2]
QUERY_PLUGIN:
  alienvault:
    enable: true
  certspotter:        # https://www.certspotter.com/
    after_id: 1
    max_page: 3
    enable: true
  crtsh:
    enable: true
  fofa:               # fofa 的 key 配置在下面 FOFA 段
    enable: true
  hunter_qax:         # https://hunter.qianxin.com/
    api_key: ""
    page_size: 100
    max_page: 5
    enable: false
  passivetotal:       # https://community.riskiq.com/
    auth_email: ""
    auth_key: ""
    enable: false
  quake_360:          # https://quake.360.cn/
    quake_token: ""
    max_size: 500
    enable: false
  rapiddns:
    enable: true
  securitytrails:     # https://securitytrails.com/
    api_key: ""
    enable: false
  virustotal:         # https://www.virustotal.com/gui/
    api_key: ""
    enable: false
  zoomeye:
    api_key: ""
    max_page: 20
    enable: false
  chaos:
    api_key: ""
    enable: false

# GeoIP 数据库文件配置项
# 默认指向项目根目录下的 geoip/，绝对/相对路径均可，留空则禁用对应查询
GEOIP:
  CITY: 'geoip/GeoLite2-City.mmdb'
  ASN: 'geoip/GeoLite2-ASN.mmdb'
  COUNTRY: 'geoip/GeoLite2-Country.mmdb'

# FOFA API 配置项
FOFA:
  URL: "https://fofa.info"
  KEY: ""
  MAX_PAGE: 5
  PAGE_SIZE: 2000

# *** 监控任务消息推送配置 ****
# 钉钉消息推送配置
DINGDING:
  SECRET: ""
  ACCESS_TOKEN: ""

# 飞书消息推送配置（需设置签名校验）
FEISHU:
  WEBHOOK_URL: ""
  SECRET: ""

# 企业微信推送配置
WXWORK:
  WEBHOOK_URL: ""

# 邮件发送配置
EMAIL:
  HOST: ""
  PORT: ""
  USERNAME: ""
  PASSWORD: ""
  TO: ""

# 监控任务 WEBHOOK 配置（IP/域名监控和站点监控结束后 POST JSON）
WEBHOOK:
  URL: ""
  TOKEN: ""

# GITHUB 搜索 TOKEN
GITHUB:
  TOKEN: ""

# 代理配置项，如 "http://127.0.0.1:8080"，端口扫描不会走代理
PROXY:
  HTTP_URL: ""

ARL:
  AUTH: true
  # API 认证 key，可访问 /api/doc 查看文档
  API_KEY: ""
  BLACK_IPS:
    - 127.0.0.0/8
    - 0.0.0.0/8
    - 172.16.0.0/12
    - 100.64.0.0/10
  ## 禁止域名，不可为空数组
  FORBIDDEN_DOMAINS: []
  # 端口对应前端测试选项
  PORT_TOP_10: "80,443,8443,8080,8081,8888,8089,5000,5001,8085,800,81,9000,88,8001,8090"
  # 域名爆破字典前端大字典选项，空即系统默认
  DOMAIN_DICT: ""
  # 文件泄漏字典，空即系统默认
  FILE_LEAK_DICT: ""
  # 域名爆破并发数
  DOMAIN_BRUTE_CONCURRENT: 300
  # 组合生成的域名爆破并发数
  ALT_DNS_CONCURRENT: 1500

# APScheduler 调度轮询间隔（秒）
SCHEDULER:
  POLL_INTERVAL: 58
