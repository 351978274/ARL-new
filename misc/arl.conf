# ARL 现代化版 Nginx 站点配置
# 替代原 misc/arl.conf（架构已去除 Celery，仅需 uvicorn 单进程）
#
# 部署：
#   1. 复制到 /etc/nginx/conf.d/arl.conf
#   2. 生成自签证书或替换为正式证书
#   3. nginx -t && systemctl reload nginx

server {
    listen 5003 ssl http2;

    ssl_certificate /etc/ssl/certs/arl_web.crt;
    ssl_certificate_key /etc/ssl/certs/arl_web.key;
    ssl_session_timeout 1d;
    ssl_session_cache shared:MozSSL:10m;
    ssl_session_tickets off;

    ssl_dhparam /etc/ssl/certs/dhparam.pem;

    # intermediate configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    add_header Strict-Transport-Security "max-age=63072000" always;

    access_log /var/log/nginx/arl.access.log main;

    # 前端静态资源（如使用官方前端）
    root /opt/ARL/docker/frontend;

    location / {
        try_files $uri $uri/ /index.html;
        index index.html index.htm;
    }

    # 后端 API 反代到 uvicorn（默认 127.0.0.1:5018）
    location /api/ {
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 截图等可能较大
        client_max_body_size 20m;
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;

        proxy_pass http://127.0.0.1:5018;
    }

    location /image/ {
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Host $http_host;
        proxy_pass http://127.0.0.1:5018;
    }
}
